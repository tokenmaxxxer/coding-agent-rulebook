  <line x1="490" y1="70" x2="490" y2="500" stroke="#e2e5ec" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="625" y1="70" x2="625" y2="500" stroke="#e2e5ec" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="368" y="80" font-family="sans-serif" font-size="11" font-weight="700" fill="#2f855a">geo-mean 1.50×</text>

