  <text x="350" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1a202c">Figure 4. Plugin ablation — wall-clock speedup per task (off / on)</text>
  <text x="350" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a5568">18 tasks × 2 arms × 2 reps = 72 headless runs · quality tied: 630/632 hidden checks pass in each arm</text>

